<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Message Sent — Thanks</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:    #0B1120;
    --bg-panel:   #121B2E;
    --bg-panel-2: #16213A;
    --line:       #223151;
    --accent:     #5EEAD4;
    --accent-dim: #2DD4BF33;
    --text-hi:    #EAF0FB;
    --text-mid:   #A9B4CC;
    --text-low:   #6B7690;
    --font-display:'Space Grotesk', sans-serif;
    --font-body:  'Inter', sans-serif;
    --font-mono:  'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    font-family:var(--font-body);
    background:
      radial-gradient(ellipse 900px 500px at 15% 10%, #16213A 0%, transparent 60%),
      radial-gradient(ellipse 700px 500px at 90% 90%, #131c30 0%, transparent 55%),
      var(--bg-deep);
  }

  .card{
    position:relative;
    width:100%;
    max-width:460px;
    background:linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-panel-2) 100%);
    border:1px solid var(--line);
    border-radius:22px;
    padding:56px 40px 40px;
    text-align:center;
    animation:rise .6s cubic-bezier(.2,.8,.2,1) both;
  }
  .card::before{
    content:"";
    position:absolute; top:0; left:0; right:0; height:38px;
    background:#0F1729;
    border-bottom:1px solid var(--line);
    border-radius:22px 22px 0 0;
  }
  .card::after{
    content:"";
    position:absolute; top:14px; left:22px;
    width:10px; height:10px; border-radius:50%;
    background:#FB7185;
    box-shadow:18px 0 0 #FBBF24, 36px 0 0 var(--accent);
  }

  .badge{
    width:64px; height:64px;
    margin:8px auto 26px;
    border-radius:50%;
    background:var(--accent-dim);
    display:flex; align-items:center; justify-content:center;
  }
  .badge svg{width:28px; height:28px;}

  .eyebrow{
    display:block;
    font-family:var(--font-mono);
    font-size:.68rem;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:10px;
  }
  .eyebrow::before{content:"// ";}

  h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:1.9rem;
    color:var(--text-hi);
    letter-spacing:-0.02em;
    margin:0 0 14px;
  }

  p.desc{
    font-family:var(--font-body);
    color:var(--text-mid);
    font-size:.98rem;
    line-height:1.7;
    margin:0 0 34px;
  }

  .status{
    font-family:var(--font-mono);
    font-size:.78rem;
    color:var(--text-low);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 14px;
    margin:0 0 30px;
    text-align:left;
  }
  .status b{color:var(--accent); font-weight:500;}

  a.go-back{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:var(--accent);
    color:#052925;
    text-decoration:none;
    font-family:var(--font-mono);
    font-weight:500;
    font-size:.86rem;
    letter-spacing:.02em;
    padding:12px 24px;
    border-radius:999px;
    transition:transform .2s ease, box-shadow .2s ease, background .2s ease;
  }
  a.go-back:hover{
    background:#7FF3E1;
    box-shadow:0 8px 24px -6px var(--accent-dim);
    transform:translateY(-2px);
  }

  @keyframes rise{
    from{opacity:0; transform:translateY(16px);}
    to{opacity:1; transform:translateY(0);}
  }
</style>
</head>
<body>

  <div class="card">
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="#5EEAD4" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <span class="eyebrow">message.status</span>
    <h1>Thanks for reaching out!</h1>
    <p class="desc">Your message was sent successfully. I usually reply within a day or two — I'll get back to you at the email address you provided.</p>
    <div class="status"><b>200 OK</b> — delivered to inbox</div>
    <a class="go-back" href="/Portfolio/#contact">← Go back</a>
  </div>

</body>
</html>
